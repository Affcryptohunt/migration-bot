```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scan Results</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#0f172a;
color:white;
}
</style>

</head>

<body class="p-10">

<h1 class="text-3xl font-bold mb-10">

Scan Results

</h1>

<div class="grid grid-cols-3 gap-6 mb-10">

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Products Found</p>
<p id="product-count" class="text-2xl font-bold"></p>
</div>

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Platform</p>
<p id="platform" class="text-2xl font-bold"></p>
</div>

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Export</p>
<p class="text-2xl font-bold">Shopify CSV</p>
</div>

</div>

<a id="download"
class="bg-indigo-600 px-6 py-3 rounded-lg mb-10 inline-block">

Download CSV

</a>

<h2 class="text-2xl font-bold mt-12 mb-4">
Import To Shopify
</h2>

<div class="flex items-center gap-3 mb-6">
  <input
    id="shop-domain"
    placeholder="mystore.myshopify.com"
    class="px-4 py-3 rounded-lg text-black w-72"
  />

  <input
    id="shop-token"
    placeholder="Shopify API Token"
    class="px-4 py-3 rounded-lg text-black w-72"
  />

  <button
    onclick="importShopify()"
    class="bg-green-600 px-6 py-3 rounded-lg"
  >
    Import Products
  </button>
</div>

<p id="import-status" class="mt-4 text-gray-400"></p>

<h2 class="text-2xl font-bold mt-12 mb-6">
Store Insights
</h2>

<div class="grid grid-cols-3 gap-6 mb-10">

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Average Price</p>
<p id="avg-price" class="text-2xl font-bold"></p>
</div>

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Lowest Price</p>
<p id="min-price" class="text-2xl font-bold"></p>
</div>

<div class="bg-slate-800 p-6 rounded-xl">
<p class="text-gray-400">Highest Price</p>
<p id="max-price" class="text-2xl font-bold"></p>
</div>

</div>

<h3 class="text-xl font-semibold mb-4">
Top Categories
</h3>

<ul id="category-list" class="space-y-2"></ul>

<h2 class="text-2xl font-bold mt-10 mb-6">

Product Preview

</h2>

<div class="overflow-x-auto">

<table class="w-full bg-slate-800 rounded-xl">

<thead>

<tr class="text-left border-b border-slate-700">

<th class="p-4">Image</th>
<th class="p-4">Title</th>
<th class="p-4">Price</th>

</tr>

</thead>

<tbody id="product-table">

</tbody>

</table>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const file = params.get("file")

async function loadResults(){

const res = await fetch("http://localhost:8000/migrate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
url: params.get("url")
})

})

const data = await res.json()

document.getElementById("product-count").innerText =
data.product_count

document.getElementById("platform").innerText =
data.platform

document.getElementById("download").href =
"http://localhost:8000/"+data.csv_file

window.products = data.products

const analytics = data.analytics

document.getElementById("avg-price").innerText =
"$"+analytics.avg_price

document.getElementById("min-price").innerText =
"$"+analytics.min_price

document.getElementById("max-price").innerText =
"$"+analytics.max_price

const catList = document.getElementById("category-list")

for(const cat in analytics.categories){

const li = document.createElement("li")

li.innerText = cat + " ("+analytics.categories[cat]+")"

catList.appendChild(li)

}

const table = document.getElementById("product-table")

data.products.forEach(p=>{

const row = document.createElement("tr")

row.innerHTML = `
<td class="p-4">
<img src="${p.images?.[0] || ''}" class="w-16">
</td>
<td class="p-4">${p.title}</td>
<td class="p-4">${p.price}</td>
`

table.appendChild(row)

})

}

async function importShopify(){

const shop = document.getElementById("shop-domain").value
const token = document.getElementById("shop-token").value

document.getElementById("import-status").innerText =
"Importing products..."

const res = await fetch("http://localhost:8000/shopify-import",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
shop:shop,
token:token,
products:window.products
})

})

const data = await res.json()

document.getElementById("import-status").innerText =
data.imported + " products imported to Shopify"

}

loadResults()

</script>

</body>
</html>
```
