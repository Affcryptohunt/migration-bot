```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanning Store</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',sans-serif;
background:#0f172a;
color:white;
}
</style>

</head>

<body class="flex items-center justify-center h-screen">

<div class="bg-slate-800 p-10 rounded-xl w-full max-w-xl">

<h2 class="text-2xl font-bold mb-6 text-center">

Scanning Store...

</h2>

<p id="store-url-display" class="text-gray-400 text-center mb-8"></p>

<div class="space-y-4">

<div id="step1" class="flex items-center text-gray-400">
<span class="mr-3">⏳</span>
Detecting platform
</div>

<div id="step2" class="flex items-center text-gray-400">
<span class="mr-3">⏳</span>
Crawling site pages
</div>

<div id="step3" class="flex items-center text-gray-400">
<span class="mr-3">⏳</span>
Extracting products
</div>

<div id="step4" class="flex items-center text-gray-400">
<span class="mr-3">⏳</span>
Preparing Shopify CSV
</div>

</div>

<div class="mt-8 bg-slate-700 h-3 rounded-full">

<div id="progress-bar"
class="bg-indigo-600 h-3 rounded-full"
style="width:0%">

</div>

</div>

<p id="status" class="text-center text-gray-400 mt-4">

Initializing scan...

</p>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const url = params.get("url")

document.getElementById("store-url-display").innerText = url

let progress = 0

function updateProgress(step, text) {
  const stepEl = document.getElementById("step" + step)
  stepEl.innerHTML = "✅ " + stepEl.innerText
  document.getElementById("status").innerText = text
  progress += 25
  document.getElementById("progress-bar").style.width = progress + "%"
}

async function checkStatus(jobId) {
  const res = await fetch(`/status/${jobId}`)
  const data = await res.json()

  if (data.status === "finished") {
    renderResults(data.result)
  } else {
    setTimeout(() => {
      checkStatus(jobId)
    }, 2000)
  }
}

function renderResults(result) {
  updateProgress(2, "Crawling store pages")
  updateProgress(3, "Extracting products")
  updateProgress(4, "Preparing Shopify CSV")
  document.getElementById("status").innerText = "Scan complete. Results ready."
  console.log("Scrape result:", result)
}

async function startScan() {
  try {
    updateProgress(1, "Platform detected")

    const res = await fetch("/scrape", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        url: url
      })
    })

    const data = await res.json()

    document.getElementById("status").innerText = "Job queued. Waiting for completion..."
    checkStatus(data.job_id)
  } catch (e) {
    document.getElementById("status").innerText = "Error scanning store."
  }
}

startScan()

</script>

</body>

</html>
```
